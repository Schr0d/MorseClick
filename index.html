<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MorseClick</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e14;color:#00ff41;font-family:'JetBrains Mono',monospace;touch-action:none;user-select:none;-webkit-user-select:none}

#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative}

/* Subtle grid background */
#app::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background-image:
    linear-gradient(rgba(0,255,65,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,65,0.04) 1px,transparent 1px);
  background-size:20px 20px;
  pointer-events:none;z-index:0}

/* ── Schematic SVG area ── */
#schematic{flex:1;position:relative;overflow:hidden;min-height:0;z-index:1}
#sch-svg{width:100%;height:100%;display:block}

/* ── Readout panel ── */
#readout{padding:6px 12px;text-align:center;border-top:1px dashed #0a3a0a;flex-shrink:0;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1}
#r-letter{font-size:28px;font-weight:700;color:#00ff41;min-height:32px;line-height:1}
#r-morse{font-size:14px;font-weight:400;color:#00ff41;opacity:.8;min-height:18px;margin-top:2px}
#r-status{font-size:8px;font-weight:400;color:rgba(0,255,65,0.6);min-height:12px;margin-top:2px}

#path-bar{display:none}

/* ── Key button (telegraph key) ── */
#key{flex-shrink:0;height:72px;background:#1a2a1a;border:2px solid #2a4a2a;border-radius:4px;color:#00ff41;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 50ms,border-color 50ms,transform 50ms;margin:8px;outline:none;-webkit-tap-highlight-color:transparent;z-index:1}
#key.pressed{background:#003a00;border-color:#00ff41;transform:translateY(2px);box-shadow:0 0 20px rgba(0,255,65,0.3)}

/* ── SVG classes ── */
.edge{stroke:#0a3a0a;stroke-width:1.5;fill:none}
.edge-traced{stroke:#00661a;stroke-width:1.5;fill:none}
.edge-active{stroke:#00ff41;stroke-width:2;fill:none;filter:url(#glow)}

.nd{fill:#0a3a0a;stroke:#0a3a0a;stroke-width:1}
.nd-active{fill:#00ff41;stroke:#00ff41;stroke-width:1.5;filter:url(#glow)}
.nd-visited{fill:#00661a;stroke:#00661a;stroke-width:1}

.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;fill:#00661a}
.lbl-on{fill:#00ff41}

.dir{font-family:'JetBrains Mono',monospace;font-weight:300;fill:#0a3a0a}
.dir-on{fill:rgba(0,255,65,0.7)}

#signal{fill:#fff;filter:url(#sig-glow)}

/* Schematic labels */
.sch-label{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:400;fill:rgba(0,255,65,0.5);letter-spacing:1px}
.sch-val{font-family:'JetBrains Mono',monospace;font-size:6px;font-weight:300;fill:rgba(0,255,65,0.3)}

/* Dashed box for decoder */
.decoder-box{fill:none;stroke:rgba(0,255,65,0.15);stroke-width:1;stroke-dasharray:4 3}
.decoder-title{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:500;fill:rgba(0,255,65,0.4);letter-spacing:1.5px}

/* Wire lines (schematic traces) */
.wire{stroke:#0a3a0a;stroke-width:1.5;fill:none}
.wire-active{stroke:#00ff41;stroke-width:1.5;fill:none;filter:url(#glow)}
.wire-traced{stroke:#00661a;stroke-width:1.5;fill:none}

/* Component symbols */
.component{fill:none;stroke:#0a3a0a;stroke-width:1.5}
.component-active{fill:none;stroke:#00ff41;stroke-width:2;filter:url(#glow)}

/* Ground symbol */
.gnd-line{stroke:rgba(0,255,65,0.3);stroke-width:1}

@keyframes err-flash{0%{border-color:#ff3333}50%{border-color:#ff3333;box-shadow:0 0 30px rgba(255,50,50,0.3)}100%{border-color:#2a4a2a;box-shadow:none}}
.err-flash{animation:err-flash 300ms ease-out}

@keyframes pop{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
.pop{animation:pop 250ms ease-out}
</style>
</head>
<body>
<div id="app">
  <div id="schematic">
    <svg id="sch-svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="glow" filterUnits="userSpaceOnUse" x="0" y="0" width="480" height="520"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="sig-glow" filterUnits="userSpaceOnUse" x="0" y="0" width="480" height="520"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- Background schematic elements -->
      <g id="g-sch-bg"></g>

      <!-- Ground (drawn early so tree renders on top) -->
      <g id="g-ground"></g>

      <!-- Output wire + headphone (drawn early so tree renders on top) -->
      <g id="g-output"></g>

      <!-- Antenna + wire to key -->
      <g id="g-antenna"></g>

      <!-- Decoder box (dashed) containing the morse tree -->
      <g id="g-decoder"></g>

      <!-- Tree edges, nodes, labels -->
      <g id="g-edges"></g>
      <g id="g-dirs"></g>
      <g id="g-nodes"></g>
      <g id="g-labels"></g>

      <!-- Signal dot (always on top) -->
      <circle id="signal" cx="0" cy="0" r="3.5" display="none"/>
    </svg>
  </div>
  <div id="path-bar"></div>
  <div id="readout">
    <div id="r-letter"></div>
    <div id="r-morse"></div>
    <div id="r-status">READY</div>
  </div>
  <button id="key">KEY</button>
</div>

<script>
// ── Morse tree: flat array, node N → left(2N+1)=dit, right(2N+2)=dah ──
const T=['','E','T','I','A','N','M','S','U','R','W','D','K','G','O',
  'H','V','F','','L','','P','J','B','X','C','Y','Z','Q','','',
  '5','4','','3','','','','2','','','','','','','','1',
  '6','','','','','','','','7','','','','8','','9','0'];

const DIT_MS=200,TIMEOUT_MS=500,HOP_MS=200,VIB_MS=50,AUTO_DAH_MS=2000;

// ── State ──
let st='IDLE',cur=0,sym=[],t0=0,tid=null,aid=null,dahTid=null;

// ── Audio (Web Audio API) ──
let audioCtx=null,oscNode=null,gainNode=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  gainNode=audioCtx.createGain();
  gainNode.gain.value=0;
  gainNode.connect(audioCtx.destination);
  oscNode=audioCtx.createOscillator();
  oscNode.type='sine';
  oscNode.frequency.value=700;
  oscNode.connect(gainNode);
  oscNode.start();
}

function toneOn(){
  if(!audioCtx)return;
  gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
  gainNode.gain.setValueAtTime(0.15,audioCtx.currentTime);
  gOut.querySelectorAll('[data-sch]:not([data-sch="wire-out"])').forEach(e=>{e.style.stroke='#00ff41';e.style.filter='url(#glow)';});
}

function toneOff(){
  if(!audioCtx)return;
  gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
  gainNode.gain.setValueAtTime(0,audioCtx.currentTime+0.02);
  gOut.querySelectorAll('[data-sch]:not([data-sch="wire-out"])').forEach(e=>{e.style.stroke='#0a3a0a';e.style.filter='none';});
}

// ── DOM ──
const $=id=>document.getElementById(id);
const svg=$('sch-svg');
const gE=$('g-edges'),gD=$('g-dirs'),gN=$('g-nodes'),gL=$('g-labels');
const gAnt=$('g-antenna'),gDec=$('g-decoder'),gOut=$('g-output'),gGnd=$('g-ground'),gSch=$('g-sch-bg');
const sig=$('signal');
const rLet=$('r-letter'),rMor=$('r-morse'),rSta=$('r-status'),key=$('key');
const NS='http://www.w3.org/2000/svg';

// ── Layout constants ──
const VB_W=480,VB_H=520;
// Schematic zones
const ANT_X=36,ANT_TOP=20,ANT_BOT=75;       // Antenna on left
const KEY_SCH_X=36,KEY_SCH_Y=85;             // Key position in schematic
const DECODE_X=48,DECODE_R=VB_W-40;          // Decoder box bounds (room for output wire)
const DECODE_TOP=100,DECODE_BOT=410;          // Decoder box top/bottom
const GND_Y=495;                              // Ground line Y
const OUT_X=VB_W-36,OUT_Y=450;                // Headphone output (decoupled from GND)
const PAD=18,NR=4,MAX_D=5;

// Tree Y positions (inside decoder box)
const TREE_TOP=DECODE_TOP+18;
const LEVEL_Y=[];
for(let i=0;i<=5;i++)LEVEL_Y.push(TREE_TOP+i*((DECODE_BOT-TREE_TOP-20)/5));

function lvl(i){return Math.floor(Math.log2(i+1))}
function has(i){if(i>=T.length)return false;if(T[i]!=='')return true;return has(2*i+1)||has(2*i+2)}

const USABLE=DECODE_R-DECODE_X-2*PAD;
const pos={};

function layout(){
  // Levels 0-3: even spacing inside decoder box
  for(let d=0;d<=3;d++){
    const start=(1<<d)-1,count=1<<d;
    const y=LEVEL_Y[d];
    const nodes=[];
    for(let j=start;j<start+count&&j<T.length;j++)if(has(j))nodes.push(j);
    const n=nodes.length;if(!n)continue;
    if(d===0){pos[nodes[0]]={x:DECODE_X+USABLE/2,y}}
    else{
      const sp=USABLE/(n+1);
      nodes.forEach((idx,i)=>{pos[idx]={x:DECODE_X+PAD+sp*(i+1),y}});
    }
  }
  // Level 4: even spacing
  {
    const y=LEVEL_Y[4],start=15,count=16;
    const nodes=[];
    for(let j=start;j<start+count&&j<T.length;j++)if(has(j))nodes.push(j);
    const n=nodes.length;
    const sp=USABLE/(n+1);
    nodes.forEach((idx,i)=>{pos[idx]={x:DECODE_X+PAD+sp*(i+1),y}});
  }
  // Level 5: cluster children under parents
  {
    const y=LEVEL_Y[5],start=31,count=32;
    const nodes=[];
    for(let j=start;j<start+count&&j<T.length;j++)if(has(j))nodes.push(j);
    nodes.sort((a,b)=>{
      const pa=a%2===0?(a-2)/2:(a-1)/2;
      const pb=b%2===0?(b-2)/2:(b-1)/2;
      return pos[pa].x-pos[pb].x||a-b;
    });
    const GAP=28,MIN=16;
    nodes.forEach(idx=>{
      const p=idx%2===0?(idx-2)/2:(idx-1)/2;
      const isDah=idx%2===0;
      const px=pos[p]?pos[p].x:VB_W/2;
      pos[idx]={x:px+(isDah?GAP/2:-GAP/2),y};
    });
    for(let i=1;i<nodes.length;i++){
      const prev=pos[nodes[i-1]].x,cur=pos[nodes[i]].x;
      if(cur-prev<MIN)pos[nodes[i]].x=prev+MIN;
    }
    for(let i=nodes.length-2;i>=0;i--){
      const next=pos[nodes[i+1]].x,cur=pos[nodes[i]].x;
      if(next-cur<MIN)pos[nodes[i]].x=next-MIN;
    }
  }
  Object.values(pos).forEach(p=>{p.x=Math.max(DECODE_X+PAD+6,Math.min(DECODE_R-PAD-6,p.x))});
}

// ── Draw schematic background ──
function drawSchematic(){
  gSch.innerHTML='';gAnt.innerHTML='';gDec.innerHTML='';gOut.innerHTML='';gGnd.innerHTML='';

  // Component labels (scattered around like a real schematic)
  const labels=[
    {x:3,y:14,t:'ANT',c:'sch-label'},
    {x:DECODE_X+4,y:DECODE_TOP-4,t:'DECODER  U1',c:'decoder-title'},
    {x:OUT_X-24,y:OUT_Y+23,t:'OUT',c:'sch-label'},
    {x:VB_W/2-32,y:GND_Y+24,t:'GND',c:'sch-label'},
    {x:3,y:KEY_SCH_Y+14,t:'KEY',c:'sch-label'},
    {x:VB_W-72,y:12,t:'MORSE 1.0',c:'sch-label'},
  ];
  labels.forEach(l=>{
    const t=document.createElementNS(NS,'text');
    t.setAttribute('x',l.x);t.setAttribute('y',l.y);
    t.setAttribute('class',l.c);t.textContent=l.t;
    gSch.appendChild(t);
  });

  // ── Antenna (left side) ──
  // Antenna mast
  const antMast=document.createElementNS(NS,'line');
  antMast.setAttribute('x1',ANT_X);antMast.setAttribute('y1',ANT_BOT);
  antMast.setAttribute('x2',ANT_X);antMast.setAttribute('y2',ANT_TOP+10);
  antMast.setAttribute('class','wire');antMast.dataset.sch='ant-mast';
  gAnt.appendChild(antMast);

  // Antenna arms (V shape)
  const antArm1=document.createElementNS(NS,'line');
  antArm1.setAttribute('x1',ANT_X);antArm1.setAttribute('y1',ANT_TOP+10);
  antArm1.setAttribute('x2',ANT_X-12);antArm1.setAttribute('y2',ANT_TOP);
  antArm1.setAttribute('class','wire');antArm1.dataset.sch='ant-arm';
  gAnt.appendChild(antArm1);

  const antArm2=document.createElementNS(NS,'line');
  antArm2.setAttribute('x1',ANT_X);antArm2.setAttribute('y1',ANT_TOP+10);
  antArm2.setAttribute('x2',ANT_X+12);antArm2.setAttribute('y2',ANT_TOP);
  antArm2.setAttribute('class','wire');antArm2.dataset.sch='ant-arm';
  gAnt.appendChild(antArm2);

  // Wire from antenna to key
  const w1=document.createElementNS(NS,'path');
  w1.setAttribute('d',`M${ANT_X} ${ANT_BOT} L${ANT_X} ${KEY_SCH_Y}`);
  w1.setAttribute('class','wire');w1.dataset.sch='wire-ant-key';
  gAnt.appendChild(w1);

  // Lever (angled line, like a real telegraph key) — behind endpoints
  const keyLever=document.createElementNS(NS,'line');
  keyLever.setAttribute('x1',ANT_X);keyLever.setAttribute('y1',KEY_SCH_Y);
  keyLever.setAttribute('x2',ANT_X+28);keyLever.setAttribute('y2',KEY_SCH_Y-6);
  keyLever.setAttribute('class','wire');keyLever.dataset.sch='key-lever';
  gAnt.appendChild(keyLever);

  // Key right endpoint — behind key-left
  const keyTip=document.createElementNS(NS,'circle');
  keyTip.setAttribute('cx',ANT_X+30);keyTip.setAttribute('cy',KEY_SCH_Y);
  keyTip.setAttribute('r','3');keyTip.setAttribute('class','nd');
  keyTip.dataset.sch='key-right';gAnt.appendChild(keyTip);

  // Key left endpoint — on top layer
  const keyBase=document.createElementNS(NS,'circle');
  keyBase.setAttribute('cx',ANT_X);keyBase.setAttribute('cy',KEY_SCH_Y);
  keyBase.setAttribute('r','3');keyBase.setAttribute('class','nd');
  keyBase.dataset.sch='key-left';gAnt.appendChild(keyBase);

  // Wire from key to decoder box entry point
  const rootX=pos[0]?pos[0].x:VB_W/2;
  const w2=document.createElementNS(NS,'path');
  w2.setAttribute('d',`M${ANT_X+30} ${KEY_SCH_Y} L${rootX-20} ${KEY_SCH_Y} L${rootX-20} ${DECODE_TOP} L${rootX} ${DECODE_TOP+8}`);
  w2.setAttribute('class','wire');w2.dataset.sch='wire-key-dec';
  gAnt.appendChild(w2);

  // ── Decoder box (dashed rectangle) ──
  const box=document.createElementNS(NS,'rect');
  box.setAttribute('x',DECODE_X);box.setAttribute('y',DECODE_TOP);
  box.setAttribute('width',DECODE_R-DECODE_X);box.setAttribute('height',DECODE_BOT-DECODE_TOP);
  box.setAttribute('rx','4');box.setAttribute('class','decoder-box');
  gDec.appendChild(box);

  // Pin dots on left and right of decoder box
  // Left pin (input)
  const pinIn=document.createElementNS(NS,'circle');
  pinIn.setAttribute('cx',DECODE_X);pinIn.setAttribute('cy',DECODE_TOP+10);
  pinIn.setAttribute('r','2');pinIn.setAttribute('fill','rgba(0,255,65,0.3)');
  gDec.appendChild(pinIn);

  // Right pin (output)
  const pinOut=document.createElementNS(NS,'circle');
  pinOut.setAttribute('cx',DECODE_R);pinOut.setAttribute('cy',DECODE_TOP+10);
  pinOut.setAttribute('r','2');pinOut.setAttribute('fill','rgba(0,255,65,0.3)');
  gDec.appendChild(pinOut);

  // ── Output wire from decoder to headphone ──
  const outWire=document.createElementNS(NS,'path');
  outWire.setAttribute('d',`M${DECODE_R} ${DECODE_TOP+10} L${DECODE_R+8} ${DECODE_TOP+10} L${DECODE_R+8} ${OUT_Y} L${OUT_X+12} ${OUT_Y}`);
  outWire.setAttribute('class','wire');outWire.dataset.sch='wire-out';
  gOut.appendChild(outWire);

  // ── Headphone icon (right side) ──
  // Headband arc
  const hpBand=document.createElementNS(NS,'path');
  hpBand.setAttribute('d',`M${OUT_X-2} ${OUT_Y+2} A14 14 0 0 1 ${OUT_X+26} ${OUT_Y+2}`);
  hpBand.setAttribute('fill','none');hpBand.setAttribute('stroke','#0a3a0a');
  hpBand.setAttribute('stroke-width','2');hpBand.dataset.sch='hp-band';
  gOut.appendChild(hpBand);

  // Left earpiece
  const hpL=document.createElementNS(NS,'rect');
  hpL.setAttribute('x',OUT_X-5);hpL.setAttribute('y',OUT_Y);
  hpL.setAttribute('width','7');hpL.setAttribute('height','10');
  hpL.setAttribute('rx','2');hpL.setAttribute('class','component');
  hpL.dataset.sch='hp-left';gOut.appendChild(hpL);

  // Right earpiece
  const hpR=document.createElementNS(NS,'rect');
  hpR.setAttribute('x',OUT_X+22);hpR.setAttribute('y',OUT_Y);
  hpR.setAttribute('width','7');hpR.setAttribute('height','10');
  hpR.setAttribute('rx','2');hpR.setAttribute('class','component');
  hpR.dataset.sch='hp-right';gOut.appendChild(hpR);

  // ── Ground bus (bottom) ──
  // Main ground line
  const gndMain=document.createElementNS(NS,'line');
  gndMain.setAttribute('x1',15);gndMain.setAttribute('y1',GND_Y);
  gndMain.setAttribute('x2',VB_W-15);gndMain.setAttribute('y2',GND_Y);
  gndMain.setAttribute('class','gnd-line');gGnd.appendChild(gndMain);

  // Ground symbol (3 horizontal lines, decreasing width)
  const gndCx=VB_W/2;
  for(let i=0;i<3;i++){
    const w=20-i*6;
    const gl=document.createElementNS(NS,'line');
    gl.setAttribute('x1',gndCx-w/2);gl.setAttribute('y1',GND_Y+4+i*4);
    gl.setAttribute('x2',gndCx+w/2);gl.setAttribute('y2',GND_Y+4+i*4);
    gl.setAttribute('class','gnd-line');gGnd.appendChild(gl);
  }

  // Vertical stub from ground symbol up to ground line
  const gndStub=document.createElementNS(NS,'line');
  gndStub.setAttribute('x1',gndCx);gndStub.setAttribute('y1',GND_Y);
  gndStub.setAttribute('x2',gndCx);gndStub.setAttribute('y2',GND_Y+4);
  gndStub.setAttribute('class','gnd-line');gGnd.appendChild(gndStub);

  // Ground return from key area (thin, behind everything)
  const gndRet=document.createElementNS(NS,'path');
  gndRet.setAttribute('d',`M${ANT_X} ${KEY_SCH_Y} L${ANT_X} ${GND_Y}`);
  gndRet.setAttribute('stroke','rgba(0,255,65,0.12)');gndRet.setAttribute('stroke-width','1');
  gndRet.setAttribute('fill','none');gndRet.dataset.sch='wire-gnd-ret';
  gGnd.appendChild(gndRet);

  // Ground return from output (thin, behind everything)
  const gndRetOut=document.createElementNS(NS,'path');
  gndRetOut.setAttribute('d',`M${DECODE_R+8} ${OUT_Y+10} L${DECODE_R+8} ${GND_Y}`);
  gndRetOut.setAttribute('stroke','rgba(0,255,65,0.12)');gndRetOut.setAttribute('stroke-width','1');
  gndRetOut.setAttribute('fill','none');gndRetOut.dataset.sch='wire-gnd-out';
  gGnd.appendChild(gndRetOut);
}

// Edge offsets from node center
function botOff(i){return i===0?5:NR+1}
function topOff(i){return NR+1}

function waypoints(fi,ti){
  const a=pos[fi],b=pos[ti];
  const ab=a.y+botOff(fi),bt=b.y-topOff(ti);
  const my=(ab+bt)/2;
  return[{x:a.x,y:ab},{x:a.x,y:my},{x:b.x,y:my},{x:b.x,y:bt}];
}

function pathD(pts){return`M${pts[0].x} ${pts[0].y}L${pts[1].x} ${pts[1].y}L${pts[2].x} ${pts[2].y}L${pts[3].x} ${pts[3].y}`}

// ── Render tree ──
function render(){
  gE.innerHTML='';gD.innerHTML='';gN.innerHTML='';gL.innerHTML='';

  for(let i=0;i<T.length;i++){
    if(!has(i))continue;
    const{x,y}=pos[i];
    const d=lvl(i);
    const isDah=i>0&&i%2===0;
    const isLetter=T[i]!=='';

    for(const[ci,dir]of[[2*i+1,'·'],[2*i+2,'−']]){
      if(!has(ci)||!pos[ci])continue;
      const pts=waypoints(i,ci);
      const p=document.createElementNS(NS,'path');
      p.setAttribute('d',pathD(pts));p.setAttribute('class','edge');
      p.dataset.from=i;p.dataset.to=ci;gE.appendChild(p);

      const lx=(x+pos[ci].x)/2;
      const ly=pts[1].y;
      const fs=d<3?13:d<4?10:8;
      const t=document.createElementNS(NS,'text');
      t.setAttribute('x',lx);t.setAttribute('y',ly+4);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','central');
      t.setAttribute('font-size',fs);
      t.setAttribute('class','dir');t.dataset.dir=`${i}-${ci}`;
      t.textContent=dir;gD.appendChild(t);
    }

    // Node shape
    if(i===0){
      // Root: antenna-style triangle inside decoder
      const a=document.createElementNS(NS,'path');
      a.setAttribute('d',`M${x} ${y-10}L${x-7} ${y+4}L${x+7} ${y+4}Z`);
      a.setAttribute('class','nd');a.dataset.node=0;gN.appendChild(a);
    }else if(isLetter){
      if(isDah){
        const r=document.createElementNS(NS,'rect');
        r.setAttribute('x',x-6);r.setAttribute('y',y-2);
        r.setAttribute('width',12);r.setAttribute('height',4);
        r.setAttribute('rx',1);r.setAttribute('class','nd');
        r.dataset.node=i;gN.appendChild(r);
      }else{
        const c=document.createElementNS(NS,'circle');
        c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',NR);
        c.setAttribute('class','nd');c.dataset.node=i;gN.appendChild(c);
      }
      const t=document.createElementNS(NS,'text');
      t.setAttribute('x',x+6);t.setAttribute('y',y+NR+11);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','central');
      t.setAttribute('class','lbl');t.dataset.label=i;
      t.textContent=T[i];gL.appendChild(t);
    }else{
      if(isDah){
        const r=document.createElementNS(NS,'rect');
        r.setAttribute('x',x-4);r.setAttribute('y',y-1.5);
        r.setAttribute('width',8);r.setAttribute('height',3);
        r.setAttribute('rx',1);r.setAttribute('class','nd');
        r.dataset.node=i;gN.appendChild(r);
      }else{
        const c=document.createElementNS(NS,'circle');
        c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',2.5);
        c.setAttribute('class','nd');c.dataset.node=i;gN.appendChild(c);
      }
    }
  }
}

// ── Visual update (tree only) ──
function updateVis(){
  // Reset tree elements (clear inline styles set by down(), then reset class)
  gE.querySelectorAll('path').forEach(e=>e.className.baseVal='edge');
  gN.querySelectorAll('[data-node]').forEach(e=>{
    e.style.fill='';e.style.stroke='';e.style.filter='';
    e.className.baseVal='nd';
  });
  gL.querySelectorAll('text').forEach(e=>e.className.baseVal='lbl');
  gD.querySelectorAll('text').forEach(e=>e.className.baseVal='dir');

  // Reset schematic wires (skip always-lit antenna elements 1,2)
  gAnt.querySelectorAll('[data-sch]').forEach(e=>{
    if(e.dataset.sch==='ant-mast'||e.dataset.sch==='ant-arm'||e.dataset.sch==='wire-ant-key'||e.dataset.sch==='key-left')return;
    if(e.tagName==='line'||e.tagName==='path'){
      e.style.stroke='#0a3a0a';e.style.strokeWidth='1.5';
      e.style.filter='none';
    }else{
      e.style.fill='#0a3a0a';e.style.stroke='#0a3a0a';
      e.style.filter='none';
    }
  });
  gOut.querySelectorAll('[data-sch]').forEach(e=>{
    e.style.stroke='#0a3a0a';e.style.filter='none';
  });

  // Highlight traced path in tree
  for(let d=0;d<sym.length;d++){
    const from=d===0?0:nodeAt(sym.slice(0,d));
    const to=nodeAt(sym.slice(0,d+1));

    const e=gE.querySelector(`[data-from="${from}"][data-to="${to}"]`);
    if(e)e.className.baseVal='edge-traced';
    const n=gN.querySelector(`[data-node="${from}"]`);
    if(n)n.className.baseVal='nd-visited';
    const l=gL.querySelector(`[data-label="${from}"]`);
    if(l)l.className.baseVal='lbl lbl-on';
    const dr=gD.querySelector(`[data-dir="${from}-${to}"]`);
    if(dr)dr.className.baseVal='dir dir-on';
  }

  // Active (latest) edge and current node
  if(sym.length>0){
    const ci=nodeAt(sym);
    const pi=sym.length===1?0:nodeAt(sym.slice(0,sym.length-1));
    const ae=gE.querySelector(`[data-from="${pi}"][data-to="${ci}"]`);
    if(ae)ae.className.baseVal='edge-active';
    const n=gN.querySelector(`[data-node="${ci}"]`);
    if(n)n.className.baseVal='nd-active';
    const l=gL.querySelector(`[data-label="${ci}"]`);
    if(l)l.className.baseVal='lbl lbl-on';
    const dr=gD.querySelector(`[data-dir="${pi}-${ci}"]`);
    if(dr)dr.className.baseVal='dir dir-on';
  }
}

function nodeAt(s){let i=0;for(const c of s)i=c==='·'?2*i+1:2*i+2;return i}

// ── Signal animation ──
function animHop(fi,ti,cb){
  const a=pos[fi],b=pos[ti];
  if(!a||!b)return cb();
  sig.setAttribute('display','');
  const pts=waypoints(fi,ti);
  let tl=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;
    tl+=Math.sqrt(dx*dx+dy*dy);
  }
  const st0=performance.now();
  function tick(now){
    const p=Math.min((now-st0)/HOP_MS,1);
    const d=p*tl;let acc=0;
    let px=pts[0].x,py=pts[0].y;
    for(let i=1;i<pts.length;i++){
      const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;
      const sl=Math.sqrt(dx*dx+dy*dy);
      if(acc+sl>=d){const st2=(d-acc)/sl;px=pts[i-1].x+dx*st2;py=pts[i-1].y+dy*st2;break}
      acc+=sl;px=pts[i].x;py=pts[i].y;
    }
    sig.setAttribute('cx',px);sig.setAttribute('cy',py);
    if(p<1)aid=requestAnimationFrame(tick);
    else{sig.setAttribute('display','none');cb()}
  }
  aid=requestAnimationFrame(tick);
}

// ── State machine ──
function advance(dir){
  const ni=dir==='·'?2*cur+1:2*cur+2;
  if(ni>=T.length||!has(ni)){
    key.classList.add('err-flash');
    setTimeout(()=>key.classList.remove('err-flash'),300);
    rSta.textContent='OVERFLOW';reset();return;
  }

  sym.push(dir);st='ANIM';

  animHop(cur,ni,()=>{
    cur=ni;updateVis();

    if(T[cur]!==''){
      rLet.textContent=T[cur];
      rMor.textContent=sym.join(' ');
      rLet.classList.remove('pop');void rLet.offsetWidth;rLet.classList.add('pop');
      rSta.textContent='RESOLVED: '+T[cur];
    }else{
      rSta.textContent='SIGNAL';
    }

    st='WAIT';
    clearTimeout(tid);
    tid=setTimeout(complete,TIMEOUT_MS);
  });
}

function complete(){
  if(T[cur]!==''){
    rSta.textContent='LOCKED: '+T[cur];
    if(navigator.vibrate)navigator.vibrate(VIB_MS);
    setTimeout(reset,800);
  }else{
    rSta.textContent='NO LETTER';
    setTimeout(reset,400);
  }
}

function reset(){
  clearTimeout(tid);
  clearTimeout(dahTid);
  if(aid)cancelAnimationFrame(aid);
  cur=0;sym=[];st='IDLE';
  rLet.textContent='';rMor.textContent='';rSta.textContent='READY';
  sig.setAttribute('display','none');
  toneOff();
  updateVis();
}

// ── Input ──
function down(){
  if(st==='ANIM')return;
  if(st!=='IDLE'&&st!=='WAIT')return;
  clearTimeout(tid);
  t0=performance.now();st='TIMING';
  key.classList.add('pressed');
  initAudio();toneOn();
  // Auto-dah after 2s if key is held too long
  clearTimeout(dahTid);
  dahTid=setTimeout(()=>{
    if(st==='TIMING')up();
  },AUTO_DAH_MS);
  // Light antenna path every press (1,2,3,4,5,6)
  const antMast=gAnt.querySelector('[data-sch="ant-mast"]');
  if(antMast){antMast.style.stroke='#00ff41';antMast.style.filter='url(#glow)';}
  const antA=gAnt.querySelectorAll('[data-sch="ant-arm"]');
  antA.forEach(a=>{a.style.stroke='#00ff41';a.style.filter='url(#glow)';});
  const wireAntKey=gAnt.querySelector('[data-sch="wire-ant-key"]');
  if(wireAntKey){wireAntKey.style.stroke='#00ff41';wireAntKey.style.filter='url(#glow)';}
  const keyL=gAnt.querySelector('[data-sch="key-left"]');
  if(keyL){keyL.style.fill='#00ff41';keyL.style.stroke='#00ff41';keyL.style.filter='url(#glow)';}
  const keyR=gAnt.querySelector('[data-sch="key-right"]');
  if(keyR){keyR.style.fill='#00ff41';keyR.style.stroke='#00ff41';keyR.style.filter='url(#glow)';}
  const keyLever=gAnt.querySelector('[data-sch="key-lever"]');
  if(keyLever){keyLever.style.stroke='#00ff41';keyLever.style.filter='url(#glow)';}
  const wireKeyDec=gAnt.querySelector('[data-sch="wire-key-dec"]');
  if(wireKeyDec){wireKeyDec.style.stroke='#00ff41';wireKeyDec.style.filter='url(#glow)';}
  // Light root node every press (7)
  const rootNode=gN.querySelector('[data-node="0"]');
  if(rootNode)rootNode.className.baseVal='nd-active';
}

function up(){
  if(st!=='TIMING')return;
  clearTimeout(dahTid);
  key.classList.remove('pressed');
  toneOff();
  const keyR=gAnt.querySelector('[data-sch="key-right"]');
  if(keyR){keyR.style.fill='#0a3a0a';keyR.style.stroke='#0a3a0a';keyR.style.filter='none';}
  const keyLever=gAnt.querySelector('[data-sch="key-lever"]');
  if(keyLever){keyLever.style.stroke='#0a3a0a';keyLever.style.filter='none';}
  const wireKeyDec=gAnt.querySelector('[data-sch="wire-key-dec"]');
  if(wireKeyDec){wireKeyDec.style.stroke='#0a3a0a';wireKeyDec.style.filter='none';}
  const dir=(performance.now()-t0)<DIT_MS?'·':'−';
  if(navigator.vibrate)navigator.vibrate(VIB_MS);
  advance(dir);
}

key.addEventListener('pointerdown',e=>{e.preventDefault();down()});
key.addEventListener('pointerup',e=>{e.preventDefault();up()});
key.addEventListener('pointercancel',e=>{e.preventDefault();up()});
key.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

document.addEventListener('keydown',e=>{if(e.code==='Space'&&!e.repeat){e.preventDefault();down()}});
document.addEventListener('keyup',e=>{if(e.code==='Space'){e.preventDefault();up()}});

// ── Init ──
svg.setAttribute('viewBox',`0 0 ${VB_W} ${VB_H}`);
layout();drawSchematic();render();
// Always-lit antenna elements (1,2)
const _m=gAnt.querySelector('[data-sch="ant-mast"]');
if(_m){_m.style.stroke='#00ff41';_m.style.filter='url(#glow)';}
gAnt.querySelectorAll('[data-sch="ant-arm"]').forEach(a=>{a.style.stroke='#00ff41';a.style.filter='url(#glow)';});
const _w=gAnt.querySelector('[data-sch="wire-ant-key"]');
if(_w){_w.style.stroke='#00ff41';_w.style.filter='url(#glow)';}
const _kl=gAnt.querySelector('[data-sch="key-left"]');
if(_kl){_kl.style.fill='#00ff41';_kl.style.stroke='#00ff41';_kl.style.filter='url(#glow)';}
</script>
